# Railway deployment configuration for WebSocket server

[build]
# Build command for TypeScript compilation
build = "npm run build"

# Start command for WebSocket server
start = "node dist/server/index.js"

[deploy]
# Number of instances for horizontal scaling
# Railway auto-scales based on load
numReplicas = 1

# Health check endpoint
healthcheckPath = "/health"
healthcheckTimeout = 100

# Restart policy for resilience
restartPolicyType = "ON_FAILURE"

# Resource allocation
[deploy.resources]
memory = "512"
cpu = "0.5"

[deploy.healthcheck]
# HTTP health check
path = "/health"
timeout = 100
interval = 30
